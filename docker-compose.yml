services:
  build-prog-questions:
    build: .
    command: ["python", "build/build.py"]
    volumes:
      - ./src:/app/src:ro
      - ./dist:/app/dist

  build-prog-questions-debug:
    build: .
    command: ["python", "build/build.py", "--debug"]
    volumes:
      - ./src:/app/src:ro
      - ./dist:/app/dist